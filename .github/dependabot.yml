version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    reviewers:
      - 'sriramkidambi'
    assignees:
      - 'sriramkidambi'
    commit-message:
      prefix: 'deps'
      include: 'scope'
    labels:
      - 'dependencies'
    groups:
      electron:
        patterns:
          - 'electron*'
          - '@electron/*'
      react:
        patterns:
          - 'react*'
          - '@types/react*'
      typescript-eslint:
        patterns:
          - '@typescript-eslint/*'
      testing:
        patterns:
          - 'jest*'
          - '@testing-library/*'
      webpack:
        patterns:
          - 'webpack*'
          - '@pmmmwh/*'
          - 'html-webpack-*'
